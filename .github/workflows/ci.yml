name: ci

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    paths:
      - "src/**"
      - "pom.xml"
      - "mvnw"
      - "mvnw.cmd"
      - ".mvn/**"

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Instalar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Dar permissão ao mvnw
        run: chmod +x mvnw

      - name: Build
        run: ./mvnw -B clean install -DskipTests

  lint-and-test:
    needs: build
    uses: ./.github/workflows/lint-and-test.yml
    with:
      run_tests: true
      run_lint: true

  package:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Instalar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Dar permissão ao mvnw
        run: chmod +x mvnw

      - name: Package
        run: ./mvnw -B package -DskipTests

      - name: Listar artefatos gerados
        run: ls -la target/*.jar

  deploy:
    runs-on: ubuntu-latest
    needs: [ build, lint-and-test, package ]
    steps:
      - name: Deploy
        run: echo "Deploy realizado com sucesso"
